<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">
    <meta name="description" content="Rover Control System - Offline ROS2 Web Interface">

    <title>Rover Control</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css?v=20260308a">
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="title">ROVER MOBILE CONTROLLER</h1>
            </div>
        </header>

        <!-- Main content -->
        <main class="main-content">


            <!-- Dashboard: Telemetry + Controls side by side -->
            <section class="dashboard-split" aria-label="Dashboard">
                <div class="telemetry-panel">
                    <div class="telemetry-row">
                        <span class="telemetry-label">linear: x</span>
                        <span class="telemetry-value" id="linear-x">0.00</span>
                    </div>
                    <div class="telemetry-row">
                        <span class="telemetry-label">angular: y</span>
                        <span class="telemetry-value" id="angular-y">0.00</span>
                    </div>
                    <div class="telemetry-row">
                        <span class="telemetry-label">angular: z</span>
                        <span class="telemetry-value" id="angular-z">0.00</span>
                    </div>
                </div>
                <div class="controls-panel">
                    <button class="special-btn btn-special-cmd" id="btn-special-cmd"
                        aria-label="Special Command Toggle">
                        <span class="special-btn-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M6 3v12" />
                                <path d="M18 9a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" />
                                <path d="M6 21a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" />
                                <path d="M18 9c0 4-4 6-12 6" />
                            </svg></span>
                        <span class="special-btn-text">DIFF</span>
                    </button>
                    <button class="special-btn btn-speed-mode" id="btn-speed-mode" aria-label="Toggle Speed Mode">
                        <span class="special-btn-icon">🐢</span>
                        <span class="speed-mode-text">SLOW MODE</span>
                    </button>
                </div>
            </section>

            <!-- Joystick Style Toggle + Armed/Disarmed -->
            <section class="style-toggle-panel">
                <button class="mode-btn compact" id="btn-mode" aria-label="Toggle Armed/Disarmed Mode">
                    <span class="mode-btn-text">DISARMED</span>
                </button>
                <span class="style-toggle-label">UNIFIED</span>
                <label class="switch">
                    <input type="checkbox" id="joystick-style-toggle">
                    <span class="slider round"></span>
                </label>
                <span class="style-toggle-label">SPLIT</span>
            </section>

            <!-- Joystick Controls -->
            <section class="joystick-panel" aria-label="Joystick Controls">

                <!-- SPLIT JOYSTICKS -->
                <div class="joystick-container split-view" id="joystick-split" style="display: none;">
                    <div class="joystick-wrapper">
                        <span class="joystick-label">LINEAR X</span>
                        <div class="joystick-track vertical" id="joystick-linear">
                            <div class="joystick-center-line"></div>
                            <div class="joystick-thumb" id="thumb-linear"></div>
                        </div>
                        <div class="joystick-hints vertical-hints">
                            <span>FWD</span>
                            <span>BWD</span>
                        </div>
                    </div>

                    <div class="joystick-wrapper">
                        <span class="joystick-label">ANGULAR Z</span>
                        <div class="joystick-track horizontal" id="joystick-angular">
                            <div class="joystick-center-line"></div>
                            <div class="joystick-thumb" id="thumb-angular"></div>
                        </div>
                        <div class="joystick-hints horizontal-hints">
                            <span>LEFT</span>
                            <span>RIGHT</span>
                        </div>
                    </div>
                </div>

                <!-- UNIFIED JOYSTICK -->
                <div class="joystick-container unified-view" id="joystick-unified">
                    <div class="unified-wrapper">
                        <span class="joystick-label">LINEAR X + ANGULAR Z</span>
                        <div class="unified-track-area">
                            <span class="unified-hint hint-top">FWD</span>
                            <span class="unified-hint hint-bottom">BWD</span>
                            <span class="unified-hint hint-left">LEFT</span>
                            <span class="unified-hint hint-right">RIGHT</span>
                            <div class="joystick-track unified" id="joystick-2d">
                                <div class="joystick-crosshair-x"></div>
                                <div class="joystick-crosshair-y"></div>
                                <div class="joystick-center-dot"></div>
                                <div class="joystick-thumb round-thumb" id="thumb-2d"></div>
                            </div>
                        </div>
                    </div>
                </div>

            </section>




        </main>
    </div>

    <!-- JavaScript -->
    <script src="roslib.min.js"></script>
    <script src="app.js?v=20260308a"></script>
</body>

</html>
